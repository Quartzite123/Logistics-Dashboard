<!--
  stlite bundle entry point.

  Packages the Streamlit app as a static HTML/JS bundle that runs Python in
  the browser via Pyodide (WebAssembly). After a one-time ~30–50 MB cached
  download, the app runs fully offline and can be installed as a PWA.

  Build & deploy:
    1.  Run `python -m http.server 8000` from the repo root, then visit
        http://localhost:8000/stlite/ to test locally.
    2.  Deploy the whole repo to any HTTPS static host (GitHub Pages,
        Cloudflare Pages, nginx).
    3.  Visit the URL once on each device → "Install" / "Add to Home Screen".

  Notes:
    * stlite version is pinned (see CDN URLs below). Bump only after testing.
    * The <app-file> list is generated — re-run the listing script when
      adding/removing app modules (see chat history).
    * Private business-data files (Kiirus*.xlsx, kiirus*.csv at repo root)
      are intentionally EXCLUDED from the bundle — they should never be
      shipped to a public deployment. Sample inputs are user-supplied at
      runtime via the in-app upload dialog.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kiirus Xpress — Logistics Intelligence</title>
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#0b0c0d" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.css" />
  </head>
  <body>
    <streamlit-app>
      <app-entrypoint-file name="streamlit_app.py">
import sys
from pathlib import Path
ROOT = Path("/mount").resolve()
if str(ROOT) not in sys.path:
    sys.path.insert(0, str(ROOT))
from app.main import main
main()
      </app-entrypoint-file>

      <!-- Application Python sources, custom-component assets, and bundled
           reference data. Generated — see chat history for the listing
           script. Re-run that script after adding new files under app/. -->
      <app-file name="app/__init__.py" url="../app/__init__.py"></app-file>
      <app-file name="app/assets/logo.png" url="../app/assets/logo.png"></app-file>
      <app-file name="app/components/__init__.py" url="../app/components/__init__.py"></app-file>
      <app-file name="app/components/_html/kpi_grid/index.html" url="../app/components/_html/kpi_grid/index.html"></app-file>
      <app-file name="app/components/_html/kpi_grid/kpi_grid.js" url="../app/components/_html/kpi_grid/kpi_grid.js"></app-file>
      <app-file name="app/components/_html/kpi_grid/styles.css" url="../app/components/_html/kpi_grid/styles.css"></app-file>
      <app-file name="app/components/_html/sidebar/index.html" url="../app/components/_html/sidebar/index.html"></app-file>
      <app-file name="app/components/_html/sidebar/logo.png" url="../app/components/_html/sidebar/logo.png"></app-file>
      <app-file name="app/components/_html/sidebar/sidebar.js" url="../app/components/_html/sidebar/sidebar.js"></app-file>
      <app-file name="app/components/_html/sidebar/styles.css" url="../app/components/_html/sidebar/styles.css"></app-file>
      <app-file name="app/components/chart_expand.py" url="../app/components/chart_expand.py"></app-file>
      <app-file name="app/components/chart_heatmap.py" url="../app/components/chart_heatmap.py"></app-file>
      <app-file name="app/components/chart_pair.py" url="../app/components/chart_pair.py"></app-file>
      <app-file name="app/components/data_table.py" url="../app/components/data_table.py"></app-file>
      <app-file name="app/components/global_styles.py" url="../app/components/global_styles.py"></app-file>
      <app-file name="app/components/kpi_cards.py" url="../app/components/kpi_cards.py"></app-file>
      <app-file name="app/components/kpi_grid_component.py" url="../app/components/kpi_grid_component.py"></app-file>
      <app-file name="app/components/layout.py" url="../app/components/layout.py"></app-file>

      <app-file name="app/components/sidebar_component.py" url="../app/components/sidebar_component.py"></app-file>

      <app-file name="app/pipeline/__init__.py" url="../app/pipeline/__init__.py"></app-file>
      <app-file name="app/pipeline/dedup.py" url="../app/pipeline/dedup.py"></app-file>

      <app-file name="app/sections/__init__.py" url="../app/sections/__init__.py"></app-file>
      <app-file name="app/sections/customize.py" url="../app/sections/customize.py"></app-file>
      <app-file name="app/sections/edit.py" url="../app/sections/edit.py"></app-file>
      <app-file name="app/sections/landing.py" url="../app/sections/landing.py"></app-file>
      <app-file name="app/sections/tat.py" url="../app/sections/tat.py"></app-file>
      <app-file name="app/sections/transit.py" url="../app/sections/transit.py"></app-file>
      <app-file name="app/store/__init__.py" url="../app/store/__init__.py"></app-file>
      <app-file name="app/store/db.py" url="../app/store/db.py"></app-file>
      <app-file name="app/store/queries.py" url="../app/store/queries.py"></app-file>
      <app-file name="app/store/schema.py" url="../app/store/schema.py"></app-file>
      <app-file name="app/store/seed.py" url="../app/store/seed.py"></app-file>
      <app-file name="streamlit_app.py" url="../streamlit_app.py"></app-file>

      <!-- Python wheels loaded by Pyodide. Mirrors requirements.txt. -->
      <requirements>
        streamlit
        pandas
        openpyxl
        plotly
        numpy
        streamlit-sortables
      </requirements>
    </streamlit-app>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.js"></script>

    <!-- Service worker for offline PWA caching (stlite runtime + wheels). -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch((e) => console.log("SW failed:", e));
      }
    </script>
  </body>
</html>
