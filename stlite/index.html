<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiirus Xpress — Logistics Intelligence</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#0b0c0d" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    @stlite/mountable ships a webpack UMD bundle that exposes a global
    `stlite` variable (no ES module export). Load it as a regular script,
    then call `stlite.mount(...)` from a non-module script below.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.js"></script>

  <script>
    stlite.mount(
      {
        // streamlit is bundled into stlite itself — only list extras here.
        requirements: ["pandas", "openpyxl", "plotly", "numpy", "sqlite3"],
        entrypoint: "streamlit_app.py",
        files: {
          // Entry point
          "streamlit_app.py":                                 { url: "../streamlit_app.py" },

          // Top-level app package
          "app/__init__.py":                                  { url: "../app/__init__.py" },
          "app/main.py":                                      { url: "../app/main.py" },

          // Pipeline
          "app/pipeline/__init__.py":                         { url: "../app/pipeline/__init__.py" },
          "app/pipeline/ingest.py":                           { url: "../app/pipeline/ingest.py" },
          "app/pipeline/dedup.py":                            { url: "../app/pipeline/dedup.py" },
          "app/pipeline/sla.py":                              { url: "../app/pipeline/sla.py" },
          "app/pipeline/zones.py":                            { url: "../app/pipeline/zones.py" },
          "app/pipeline/oda.py":                              { url: "../app/pipeline/oda.py" },
          "app/pipeline/origin_lookup.py":                    { url: "../app/pipeline/origin_lookup.py" },

          // Store / SQLite layer
          "app/store/__init__.py":                            { url: "../app/store/__init__.py" },
          "app/store/db.py":                                  { url: "../app/store/db.py" },
          "app/store/schema.py":                              { url: "../app/store/schema.py" },
          "app/store/seed.py":                                { url: "../app/store/seed.py" },
          "app/store/queries.py":                             { url: "../app/store/queries.py" },

          // Components
          "app/components/__init__.py":                       { url: "../app/components/__init__.py" },
          "app/components/theme.py":                          { url: "../app/components/theme.py" },
          "app/components/global_styles.py":                  { url: "../app/components/global_styles.py" },
          "app/components/layout.py":                         { url: "../app/components/layout.py" },
          "app/components/modals.py":                         { url: "../app/components/modals.py" },
          "app/components/upload_dialog.py":                  { url: "../app/components/upload_dialog.py" },
          "app/components/kpi_cards.py":                      { url: "../app/components/kpi_cards.py" },
          "app/components/data_table.py":                     { url: "../app/components/data_table.py" },
          "app/components/chart_pair.py":                     { url: "../app/components/chart_pair.py" },
          "app/components/chart_heatmap.py":                  { url: "../app/components/chart_heatmap.py" },
          "app/components/chart_expand.py":                   { url: "../app/components/chart_expand.py" },
          "app/components/sidebar_component.py":              { url: "../app/components/sidebar_component.py" },
          "app/components/kpi_grid_component.py":             { url: "../app/components/kpi_grid_component.py" },

          // Custom-component iframe assets (sidebar + KPI grid)
          "app/components/_html/sidebar/index.html":          { url: "../app/components/_html/sidebar/index.html" },
          "app/components/_html/sidebar/sidebar.js":          { url: "../app/components/_html/sidebar/sidebar.js" },
          "app/components/_html/sidebar/styles.css":          { url: "../app/components/_html/sidebar/styles.css" },
          "app/components/_html/sidebar/logo.png":            { url: "../app/components/_html/sidebar/logo.png" },
          "app/components/_html/kpi_grid/index.html":         { url: "../app/components/_html/kpi_grid/index.html" },
          "app/components/_html/kpi_grid/kpi_grid.js":        { url: "../app/components/_html/kpi_grid/kpi_grid.js" },
          "app/components/_html/kpi_grid/styles.css":         { url: "../app/components/_html/kpi_grid/styles.css" },

          // Sections
          "app/sections/__init__.py":                         { url: "../app/sections/__init__.py" },
          "app/sections/aggregate.py":                        { url: "../app/sections/aggregate.py" },
          "app/sections/landing.py":                          { url: "../app/sections/landing.py" },
          "app/sections/tat.py":                              { url: "../app/sections/tat.py" },
          "app/sections/transit.py":                          { url: "../app/sections/transit.py" },
          "app/sections/customize.py":                        { url: "../app/sections/customize.py" },
          "app/sections/edit.py":                             { url: "../app/sections/edit.py" },

          // Bundled reference data — pincode_master.xlsx is 606 KB binary
          // and is fetched on first load, then cached by the service worker.
          // seed_pincodes_if_empty() loads it into pincode_master_live the
          // first time the app boots.
          "app/reference/matrix.csv":                         { url: "../app/reference/matrix.csv" },
          "app/reference/pincode_master.xlsx":                { url: "../app/reference/pincode_master.xlsx" },
          "app/data/origin_city_master.csv":                  { url: "../app/data/origin_city_master.csv" },
        },
      },
      document.getElementById("root")
    );
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js")
        .catch(e => console.log("SW:", e));
    }
  </script>
</body>
</html>
